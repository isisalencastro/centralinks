<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Central de links da Isis Alencastro. Encontre todas as minhas redes sociais e conteúdos em um só lugar.">
  <meta name="keywords" content="Isis Alencastro, links, redes sociais, instagram, tiktok, youtube">
  <meta name="author" content="Isis Alencastro">
  <meta name="theme-color" content="#302b63">

  <!-- Open Graph -->
  <meta property="og:title" content="Isis Alencastro | Links">
  <meta property="og:description" content="Central de links da Isis Alencastro. Encontre todas as minhas redes sociais e conteúdos em um só lugar.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="assets/og-image.jpg">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Isis Alencastro | Links">
  <meta name="twitter:description" content="Central de links da Isis Alencastro. Encontre todas as minhas redes sociais e conteúdos em um só lugar.">

  <title>Isis Alencastro | Links</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer">

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Background animated particles -->
  <div class="bg-particles" id="particles"></div>

  <!-- Main container -->
  <main class="container" role="main">
    <div class="card">
      <!-- Profile section -->
      <header class="profile" aria-label="Perfil">
        <div class="avatar-wrapper">
          <div class="avatar" id="avatar">
            <span class="avatar-fallback" id="avatarFallback">IA</span>
          </div>
          <div class="avatar-ring"></div>
        </div>
        <h1 class="profile-name" id="profileName">Isis Alencastro</h1>
        <p class="profile-bio" id="profileBio">Criadora de conteúdo | Empreendedora | Lifestyle</p>
      </header>

      <!-- Social icons row -->
      <nav class="social-icons" id="socialIcons" aria-label="Redes sociais"></nav>

      <!-- Divider -->
      <div class="divider">
        <span class="divider-icon"><i class="fas fa-link"></i></span>
      </div>

      <!-- Links section -->
      <section class="links-section" id="linksSection" aria-label="Links"></section>

      <!-- Footer -->
      <footer class="card-footer">
        <p>&copy; <span id="currentYear"></span> Isis Alencastro</p>
      </footer>
    </div>
  </main>

  <!-- Scripts -->
  <script src="js/config.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
