<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Desenvolvedora de Software, Analista de Marketing e Gestora de Automações com IA. Encontre todos os meus links em um só lugar.">
  <meta name="keywords" content="Isis Alencastro, desenvolvedora, software, marketing, automações, IA, links">
  <meta name="author" content="Isis Alencastro">
  <meta name="theme-color" content="#2563EB">

  <!-- Open Graph -->
  <meta property="og:title" content="Isis Alencastro | Links">
  <meta property="og:description" content="Desenvolvedora de Software, Analista de Marketing e Gestora de Automações com IA. Encontre todos os meus links em um só lugar.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="assets/og-image.jpg">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Isis Alencastro | Links">
  <meta name="twitter:description" content="Desenvolvedora de Software, Analista de Marketing e Gestora de Automações com IA.">

  <title>Isis Alencastro | Links</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/avatar.png">
  <link rel="apple-touch-icon" href="assets/avatar.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Poppins', 'sans-serif'],
            body: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
          },
        },
      },
    };
  </script>

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="font-body bg-slate-50 min-h-screen flex items-center justify-center overflow-x-hidden antialiased">
  <!-- Decorative background shapes -->
  <div class="fixed inset-0 z-0 pointer-events-none overflow-hidden" aria-hidden="true">
    <div class="bg-circle bg-circle--1"></div>
    <div class="bg-circle bg-circle--2"></div>
    <div class="bg-circle bg-circle--3"></div>
  </div>

  <!-- Main container -->
  <main class="relative z-10 w-full max-w-3xl px-4 py-8 mx-auto min-h-screen flex items-center justify-center" role="main">
    <div class="card w-full bg-white rounded-3xl shadow-lg px-8 py-12 sm:px-10 sm:py-14 transition-shadow duration-300 hover:shadow-xl">

      <!-- Profile section -->
      <header class="text-center mb-8" aria-label="Perfil">
        <div class="relative w-32 h-32 mx-auto mb-6">
          <div class="avatar w-32 h-32 rounded-full overflow-hidden bg-gradient-to-br from-blue-500 to-blue-700 flex items-center justify-center shadow-blue border-4 border-white outline outline-3 outline-blue-200 transition-transform duration-300 hover:scale-105">
            <img src="assets/avatar.png" alt="Foto de Isis Alencastro" class="w-full h-full object-cover">
          </div>
        </div>
        <h1 class="font-display text-2xl sm:text-3xl font-bold text-slate-800 mb-3 animate-fade-up" id="profileName">
          Isis Alencastro
        </h1>
        <p class="text-sm sm:text-base text-slate-500 leading-relaxed max-w-sm mx-auto animate-fade-up-delay" id="profileBio">
          Desenvolvedora de Software | Analista de Marketing | Gestora de Automações com IA
        </p>
      </header>

      <!-- Welcome message -->
      <div id="welcomeSection" class="text-center mb-8">
        <div class="inline-flex items-center gap-2 px-5 py-2.5 rounded-full bg-blue-50 border border-blue-100">
          <span class="text-blue-500 text-sm"><i class="fas fa-hand-sparkles"></i></span>
          <p class="text-sm font-medium text-blue-700">Bem-vindo(a)! Escolha um dos links abaixo</p>
        </div>
      </div>

      <!-- Links section (hidden initially) -->
      <section id="linksSection" class="flex flex-col gap-3.5 mb-8 opacity-0 translate-y-4" aria-label="Links"></section>

      <!-- Footer -->
      <footer class="text-center text-slate-400 text-xs pt-4 border-t border-slate-100">
        <p>&copy; <span id="currentYear"></span> Isis Alencastro</p>
      </footer>
    </div>
  </main>

  <!-- Scripts -->
  <script src="js/config.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
